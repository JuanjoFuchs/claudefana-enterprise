apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: claudefana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:latest
          args: ["--config", "/etc/otel-collector-config.yaml"]
          ports:
            - containerPort: 4317
              name: grpc
            - containerPort: 4318
              name: http
            - containerPort: 8889
              name: prometheus
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otel-collector-config.yaml
              subPath: otel-collector-config.yaml
              readOnly: true
      volumes:
        - name: otel-config
          configMap:
            name: otel-collector-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: claudefana
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      securityContext:
        fsGroup: 65534
        runAsUser: 65534
        runAsNonRoot: true
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--web.enable-lifecycle"
            - "--enable-feature=otlp-write-receiver"
          ports:
            - containerPort: 9090
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: prometheus-data
              mountPath: /prometheus
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
              readOnly: true
            - name: prometheus-alerts
              mountPath: /etc/prometheus/alerts
              readOnly: true
      volumes:
        - name: prometheus-data
          persistentVolumeClaim:
            claimName: prometheus-data
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-alerts
          configMap:
            name: prometheus-alerts
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: claudefana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:latest
          args: ["-config.file=/etc/loki/local-config.yaml"]
          ports:
            - containerPort: 3100
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: claudefana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
        runAsNonRoot: true
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            # Required for the org hierarchy tree panel
            - name: GF_INSTALL_PLUGINS
              value: "equansdatahub-tree-panel"
            # Anonymous access enabled by default — override via Kustomize patch for SSO
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
            # Optional: set admin password via secret
            # - name: GF_SECURITY_ADMIN_PASSWORD
            #   valueFrom:
            #     secretKeyRef:
            #       name: claudefana-grafana
            #       key: GRAFANA_ADMIN_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources/datasources.yml
              subPath: datasources.yml
              readOnly: true
            - name: grafana-dashboards
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
              subPath: dashboards.yml
              readOnly: true
            - name: grafana-dashboard-json
              mountPath: /etc/grafana/dashboards
              readOnly: true
      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards
        - name: grafana-dashboard-json
          configMap:
            name: grafana-dashboard-json
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jira-tempo-exporter
  namespace: claudefana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jira-tempo-exporter
  template:
    metadata:
      labels:
        app: jira-tempo-exporter
    spec:
      containers:
        - name: jira-tempo-exporter
          # Build from ./jira-tempo-exporter/Dockerfile and push to your registry
          image: your-registry/claudefana/jira-tempo-exporter:latest
          ports:
            - containerPort: 9102
              name: metrics
          env:
            - name: JIRA_URL
              valueFrom:
                secretKeyRef:
                  name: claudefana-jira
                  key: JIRA_URL
            - name: JIRA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claudefana-jira
                  key: JIRA_API_TOKEN
            - name: EXPORTER_PORT
              value: "9102"
            - name: REFRESH_INTERVAL
              value: "300"
            - name: LOOKBACK_DAYS
              value: "30"
            # Must match your Jira instance's story points custom field ID
            - name: STORY_POINTS_FIELD
              value: "customfield_10016"
            - name: PROJECT_FILTER
              valueFrom:
                secretKeyRef:
                  name: claudefana-jira
                  key: PROJECT_FILTER
                  optional: true
            - name: PROMETHEUS_URL
              value: "http://prometheus:9090"
            - name: COLLECT_TEAMS
              value: "false"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: graph-enrichment
  namespace: claudefana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: graph-enrichment
  template:
    metadata:
      labels:
        app: graph-enrichment
    spec:
      containers:
        - name: graph-enrichment
          # Build from ./graph-enrichment-exporter/Dockerfile and push to your registry
          image: your-registry/claudefana/graph-enrichment-exporter:latest
          ports:
            - containerPort: 9101
              name: metrics
          env:
            - name: AZURE_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: claudefana-graph
                  key: AZURE_TENANT_ID
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: claudefana-graph
                  key: AZURE_CLIENT_ID
            - name: AZURE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: claudefana-graph
                  key: AZURE_CLIENT_SECRET
            - name: EXPORTER_PORT
              value: "9101"
            - name: REFRESH_INTERVAL
              value: "3600"
            - name: PROMETHEUS_URL
              value: "http://prometheus:9090"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
