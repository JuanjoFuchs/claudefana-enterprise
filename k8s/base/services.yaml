apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: claudefana
spec:
  type: ClusterIP
  selector:
    app: otel-collector
  ports:
    - name: grpc
      port: 4317
      targetPort: 4317
    - name: http
      port: 4318
      targetPort: 4318
    - name: prometheus
      port: 8889
      targetPort: 8889
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: claudefana
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: claudefana
spec:
  type: ClusterIP
  selector:
    app: loki
  ports:
    - name: http
      port: 3100
      targetPort: 3100
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: claudefana
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: jira-tempo-exporter
  namespace: claudefana
spec:
  type: ClusterIP
  selector:
    app: jira-tempo-exporter
  ports:
    - name: metrics
      port: 9102
      targetPort: 9102
---
apiVersion: v1
kind: Service
metadata:
  name: graph-enrichment
  namespace: claudefana
spec:
  type: ClusterIP
  selector:
    app: graph-enrichment
  ports:
    - name: metrics
      port: 9101
      targetPort: 9101
