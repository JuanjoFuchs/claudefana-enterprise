apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: claudefana
spec:
  accessModes:
    - ReadWriteOnce
  # Set storageClassName to match your cluster's StorageClass.
  # Examples: "gp2" (AWS default), "standard" (GKE/minikube), "managed-premium" (AKS)
  # storageClassName: gp2
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: claudefana
spec:
  accessModes:
    - ReadWriteOnce
  # storageClassName: gp2
  resources:
    requests:
      storage: 5Gi
