apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: claudefana

resources:
  - namespace.yaml
  - configmaps.yaml
  - pvcs.yaml
  - deployments.yaml
  - services.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: grafana-dashboard-json
    files:
      - ../../dashboards/claude-code-dashboard.json
      - ../../dashboards/claude-code-user-explorer.json
